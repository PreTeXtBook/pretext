name: Integration
questiontext: '<p>Find \[ \int {@p@} d{@v@}\] [[input:ans1]] [[validation:ans1]]</p>'
generalfeedback: '<p>We can either do this question by inspection (i.e. spot the answer) or in a more formal manner by using the substitution \[ u = ({@v@}-{@a@}).\] Then, since \(\frac{d}{d{@v@}}u=1\) we have \[ \int {@p@} d{@v@} = \int u^{@n@} du = \frac{u^{@n+1@}}{@n+1@}+c = {@ta@}+c.\]</p>'
stackversion: '2025030700'
questionvariables: |-
  n:rand(5)+3;
   a:rand(5)+3;
   v:x
   p:(v-a)^n;
   ta:(v-a)^(n+1)/(n+1);
questionnote: '\(\int {@p@} d{@v@} = {@ta@}+c\)'
questionnoteformat: moodle_auto_format
questiondescriptionformat: moodle_auto_format
questionsimplify: '1'
prtcorrect: 'Correct answer, well done.'
prtpartiallycorrect: 'Your answer is partially correct.'
prtincorrect: 'Incorrect answer.'
input:
  - name: ans1
    type: algebraic
    tans: ta+c
    boxsize: '20'
    forbidwords: int
    forbidfloat: '1'
    requirelowestterms: '1'
    checkanswertype: '1'
    mustverify: '1'
    showvalidation: '1'
prt:
  - name: prt1
    autosimplify: '1'
    feedbackstyle: '1'
    node:
      - name: '0'
        answertest: Int
        sans: ans1
        tans: ta
        testoptions: v
        quiet: '0'
        trueanswernote: '1-0-T '
        falseanswernote: '1-0-F '
